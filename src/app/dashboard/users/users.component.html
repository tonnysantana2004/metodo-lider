<app-dashboard-layout pageTitle="Usuários Cadastrados">

  <div class="users-page-wrapper">

    <div class="actions-bar">
      <app-search-input placeholder="Pesquisar por nome, email ou telefone" (valueChange)="onSearchChange($event)" style="width:100%">
      </app-search-input>

    <app-users-table [users]="filteredUsers"></app-users-table>

  </div>
  
</app-dashboard-layout>
